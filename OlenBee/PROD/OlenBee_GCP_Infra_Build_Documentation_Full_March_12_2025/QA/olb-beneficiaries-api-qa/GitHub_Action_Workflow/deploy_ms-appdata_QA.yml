# Author: Francisco Gutierrez
# Email: francisco.gutierrez@globallogic.com
# Date: 2025-01-24
# Description: This workflow file automates the build and deployment process for MS-APPDATA QA
#              The image is being deployed to Gcloud Artifact Registry GCR/GAR
#              The Cloud Run instance deployment is currently disabled until development team stabilizes the app
#              So Cloud Run deployment must be manually pushed from developer's computer.

name: ms-appdata to GCP - QA (QA branch)

on:
  push:
    branches:
      - QA
    paths-ignore:
      - '.github/**'  
  pull_request:
    types: [closed]
    branches:
      - QA
    paths-ignore:
      - '.github/**'
permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Information
      run: |
        echo "The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
    
    - name: Environment variables
      run: |
        echo "Your project id is ${{ env.GCP_PROJECT_ID }} and region is ${{ env.GCP_REGION }}."
    
    - name: Checkout code
      uses: actions/checkout@v3

    - name: List files in the repository
      run: |
        ls ${{ github.workspace }}
    
    - name: Check latest change in branch
      run: |
        git log

    - name: Authenticate to GCP using Workload Identity Federation
      id: auth
      uses: google-github-actions/auth@v1
      with:
        workload_identity_provider: 'projects/334586121110/locations/global/workloadIdentityPools/olenbeegithubpool/providers/olenbeegithubprovider'
        service_account: 'olenbee-deployment-pipeline@olb-beneficiaries-api-qa.iam.gserviceaccount.com'

    - name: Login to GCR/AR
      run: |
        docker login europe-west9-docker.pkg.dev -u oauth2accesstoken -p $(gcloud auth print-access-token)
               
    - name: Image ID to compare in GCP artifact registry
      run: docker images   

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and Push image ${{ env.IMAGE_NAME }} using Buildx
      run: |
        docker buildx create --use
        docker buildx build --build-arg ASPNETCORE_ENVIRONMENT=QA --platform linux/amd64 --push \
          -t "${{ env.AR_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" ./

  # Disabled, this command should be used th first time the container is going to be deployed into the GCP project,
  # then, the imstance just needs to be updated, by deploying changed from the new GCR/GAR container image.
  # This command can be triggered manually triggered from GCLOUD Cli by following the documented procedures (Confluence)
  #  - name: Deploy CloudRun Instance to ${{ env.ENV }} GCP
  #    run: |
  #      gcloud run deploy ${{ env.SERVICE_NAME }} \
  #        --image europe-west9-docker.pkg.dev/olb-beneficiaries-api-qa/ms-appdata/ms-appdata:${{ github.sha }} \
  #        --region ${{ env.GCP_REGION }} \
  #        --platform managed \
  #        --service-account clourun-olenbee@olb-beneficiaries-api-qa.iam.gserviceaccount.com \
  #        --vpc-connector projects/olb-beneficiaries-api-qa/locations/europe-west9/connectors/olb-pprd-network-glb-netspoke \
  #        --vpc-egress all-traffic \
  #        --port 8080 \
  #        --allow-unauthenticated 

  # This step will update the cloud run instance with the new image deployed into GAR/GCR in order to refresh changes into the container 
    - name: Update CloudRun Instance with the new image ==> europe-west9-docker.pkg.dev/olb-beneficiaries-api-qa/ms-appdata/ms-appdata:${{ github.sha }}
      run: |
         gcloud run services update ${{ env.SERVICE_NAME }} \
           --region ${{ env.GCP_REGION }} \
           --image europe-west9-docker.pkg.dev/olb-beneficiaries-api-qa/ms-appdata/ms-appdata:${{ github.sha }}

env:
  ENV: QA  
  GCP_PROJECT_ID: olb-beneficiaries-api-qa
  AR_URL: europe-west9-docker.pkg.dev/olb-beneficiaries-api-qa/ms-appdata
  GCP_REGION: europe-west9
  SERVICE_NAME: ms-appdata
  IMAGE_NAME: ms-appdata
